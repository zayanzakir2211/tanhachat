name                = "chatroom-worker"
main                = "src/index.js"
compatibility_date  = "2024-01-01"

# No npm dependencies — uses Firebase REST API directly.

[vars]
FIREBASE_DATABASE_URL = "https://chatroom-app-8d1cd-default-rtdb.asia-southeast1.firebasedatabase.app"
JWT_SECRET            = "123456789123456789"

# ── FIREBASE_SECRET: get this from Firebase Console ───
# Project Settings → Service Accounts → Database Secrets
# (scroll to bottom, click "Show" next to the secret)
# Then add it here:
FIREBASE_SECRET = "RA6bMLPgCxvY6ly2E0MwzrlVGeUknCOvXHqrt8ab"