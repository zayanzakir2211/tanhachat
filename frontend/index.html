<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TanhaChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- Font Awesome (Cloudflare CDN) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══ LOGIN SCREEN ══ -->
  <div id="login-screen" class="screen active">
    <div class="login-box">
      <div class="login-header">
        <span class="logo-dot"></span>
        <h1>TANHA·CHAT</h1>
        <p>one room. just talk.</p>
      </div>
      <form id="login-form">
        <div class="field">
          <label>USERNAME</label>
          <input type="text" id="username" autocomplete="off" placeholder="your handle" required />
        </div>
        <div class="field">
          <label>PASSWORD</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <div id="login-error" class="error-msg"></div>
        <button type="submit" id="login-btn">
          <span>ENTER ROOM</span>
          <i class="fa-solid fa-arrow-right"></i>
        </button>
        <button type="button" id="register-btn" class="secondary-btn">CREATE ACCOUNT</button>
      </form>
    </div>
  </div>

  <!-- ══ CHAT SCREEN ══ -->
  <div id="chat-screen" class="screen">
    <div class="chat-layout">

      <!-- ── SIDEBAR / CHAT LIST ── -->
      <aside class="sidebar" id="sidebar">

        <!-- Top bar -->
        <div class="sidebar-top">
          <div class="app-name">TanhaChat</div>
          <button class="logout-btn" id="logout-btn" title="Logout">
            <i class="fa-solid fa-right-from-bracket"></i>
          </button>
        </div>

        <!-- Me -->
        <div class="me-tag">
          <div class="avatar" id="sidebar-avatar"></div>
          <span id="sidebar-username"></span>
          <span class="online-dot"></span>
        </div>

        <!-- Channels -->
        <div class="sidebar-section-label">CHANNELS</div>
        <button id="room-tab-btn" class="room-tab-btn active">
          <i class="fa-solid fa-hashtag"></i>
          room-1
        </button>

        <!-- Online now -->
        <div class="sidebar-section-label">ONLINE NOW</div>
        <div id="online-users" class="online-users"></div>

        <!-- Direct Messages -->
        <div class="sidebar-section-label">DIRECT MESSAGES</div>
        <div id="dm-list-section">
          <div id="dm-convo-list" class="dm-convo-list"></div>
        </div>

      </aside>

      <!-- ── MAIN CHAT ── -->
      <main class="chat-main mobile-hidden" id="chat-main">

        <!-- Chat Header -->
        <div class="chat-header">
          <!-- Mobile back button -->
          <button class="mobile-back-btn" id="mobile-back-btn" title="Back">
            <i class="fa-solid fa-chevron-left"></i>
          </button>
          <div class="chat-header-info">
            <span id="chat-header-title" class="chat-header-title">#room-1</span>
            <span id="chat-header-sub" class="chat-header-sub">Public room</span>
          </div>
        </div>

        <!-- Messages -->
        <div id="messages-area" class="messages-area">
          <div class="day-divider"><span>TODAY</span></div>
        </div>

        <!-- Reply bar -->
        <div id="reply-bar" class="reply-bar hidden">
          <div class="reply-bar-inner">
            <i class="fa-solid fa-reply" style="font-size:12px"></i>
            <span id="reply-preview-text"></span>
          </div>
          <button id="cancel-reply"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <!-- Input bar -->
        <div class="input-bar">
          <label class="attach-btn" title="Send image">
            <input type="file" id="img-input" accept="image/*" hidden />
            <i class="fa-solid fa-image"></i>
          </label>
          <button class="voice-btn" id="voice-btn" title="Hold for voice message">
            <i class="fa-solid fa-microphone"></i>
          </button>
          <div class="voice-recording-indicator hidden" id="voice-indicator">
            <span class="rec-dot"></span> Recording…
          </div>
          <textarea id="msg-input" rows="1" placeholder="Say something…" maxlength="2000"></textarea>
          <button id="send-btn" class="send-btn">
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </div>

      </main>
    </div>
  </div>

  <!-- ══ CONTEXT MENU ══ -->
  <div id="ctx-menu" class="ctx-menu hidden">
    <button data-action="reply"><i class="fa-solid fa-reply"></i> Reply</button>
    <button data-action="react"><i class="fa-regular fa-face-smile"></i> React</button>
    <button data-action="edit" class="edit-action"><i class="fa-solid fa-pen"></i> Edit</button>
    <button data-action="delete" class="delete-action"><i class="fa-solid fa-trash"></i> Delete</button>
  </div>

  <!-- ══ EMOJI PICKER ══ -->
  <div id="emoji-picker" class="emoji-picker hidden">
    <button data-emoji="👍">👍</button>
    <button data-emoji="❤️">❤️</button>
    <button data-emoji="😂">😂</button>
    <button data-emoji="😮">😮</button>
    <button data-emoji="😢">😢</button>
    <button data-emoji="🔥">🔥</button>
    <button data-emoji="👏">👏</button>
    <button data-emoji="🎉">🎉</button>
  </div>

  <!-- ══ LIGHTBOX ══ -->
  <div id="lightbox" class="lightbox hidden">
    <div class="lightbox-bg"></div>
    <img id="lightbox-img" src="" alt="" />
    <button id="lightbox-close"><i class="fa-solid fa-xmark"></i></button>
  </div>

  <!-- ══ EDIT MODAL ══ -->
  <div id="edit-modal" class="modal hidden">
    <div class="modal-box">
      <label>EDIT MESSAGE</label>
      <textarea id="edit-input" rows="3" maxlength="2000"></textarea>
      <div class="modal-actions">
        <button id="edit-cancel" class="secondary-btn">Cancel</button>
        <button id="edit-save" class="send-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
