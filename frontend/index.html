<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TanhaChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="screen active">
    <div class="login-box">
      <div class="login-header">
        <span class="logo-dot"></span>
        <h1>TANHA·CHAT</h1>
        <p>one room. just talk.</p>
      </div>
      <form id="login-form">
        <div class="field">
          <label>USERNAME</label>
          <input type="text" id="username" autocomplete="off" placeholder="your handle" required />
        </div>
        <div class="field">
          <label>PASSWORD</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <div id="login-error" class="error-msg"></div>
        <button type="submit" id="login-btn">
          <span>ENTER ROOM</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button type="button" id="register-btn" class="secondary-btn">CREATE ACCOUNT</button>
      </form>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chat-screen" class="screen">
    <div class="chat-layout">

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="app-name">TanhaChat</div>
          <button class="logout-btn" id="logout-btn" title="Logout">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>

        <div class="me-tag">
          <div class="avatar" id="sidebar-avatar"></div>
          <span id="sidebar-username"></span>
          <span class="online-dot"></span>
        </div>

        <!-- ROOM TAB -->
        <div class="sidebar-section-label">CHANNELS</div>
        <button id="room-tab-btn" class="room-tab-btn active">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
          #room-1
        </button>

        <!-- ONLINE USERS -->
        <div class="sidebar-section-label">ONLINE NOW</div>
        <div id="online-users" class="online-users"></div>

        <!-- DM LIST -->
        <div class="sidebar-section-label">DIRECT MESSAGES</div>
        <div id="dm-list-section">
          <div id="dm-convo-list" class="dm-convo-list"></div>
        </div>
      </aside>

      <!-- MAIN CHAT -->
      <main class="chat-main">
        <!-- CHAT HEADER -->
        <div class="chat-header">
          <div class="chat-header-info">
            <span id="chat-header-title" class="chat-header-title">#room-1</span>
            <span id="chat-header-sub" class="chat-header-sub">Public room</span>
          </div>
        </div>

        <div id="messages-area" class="messages-area">
          <div class="day-divider"><span>TODAY</span></div>
        </div>

        <!-- REPLY PREVIEW -->
        <div id="reply-bar" class="reply-bar hidden">
          <div class="reply-bar-inner">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M1 8l5-5v3c5 0 9 2 9 8-2-3-4-4-9-4v3L1 8z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            <span id="reply-preview-text"></span>
          </div>
          <button id="cancel-reply">✕</button>
        </div>

        <!-- INPUT BAR -->
        <div class="input-bar">
          <label class="attach-btn" title="Send image">
            <input type="file" id="img-input" accept="image/*" hidden />
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M3 16l5-5 4 4 3-3 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </label>
          <button class="voice-btn" id="voice-btn" title="Hold for voice message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <div class="voice-recording-indicator hidden" id="voice-indicator">
            <span class="rec-dot"></span> Recording…
          </div>
          <textarea id="msg-input" rows="1" placeholder="Say something…" maxlength="2000"></textarea>
          <button id="send-btn" class="send-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </main>
    </div>
  </div>

  <!-- CONTEXT MENU -->
  <div id="ctx-menu" class="ctx-menu hidden">
    <button data-action="reply">↩ Reply</button>
    <button data-action="react">😊 React</button>
    <button data-action="edit" class="edit-action">✏ Edit</button>
    <button data-action="delete" class="delete-action">🗑 Delete</button>
  </div>

  <!-- EMOJI PICKER -->
  <div id="emoji-picker" class="emoji-picker hidden">
    <button data-emoji="👍">👍</button>
    <button data-emoji="❤️">❤️</button>
    <button data-emoji="😂">😂</button>
    <button data-emoji="😮">😮</button>
    <button data-emoji="😢">😢</button>
    <button data-emoji="🔥">🔥</button>
    <button data-emoji="👏">👏</button>
    <button data-emoji="🎉">🎉</button>
  </div>

  <!-- IMAGE LIGHTBOX -->
  <div id="lightbox" class="lightbox hidden">
    <div class="lightbox-bg"></div>
    <img id="lightbox-img" src="" alt="" />
    <button id="lightbox-close">✕</button>
  </div>

  <!-- EDIT MODAL -->
  <div id="edit-modal" class="modal hidden">
    <div class="modal-box">
      <label>EDIT MESSAGE</label>
      <textarea id="edit-input" rows="3" maxlength="2000"></textarea>
      <div class="modal-actions">
        <button id="edit-cancel" class="secondary-btn">Cancel</button>
        <button id="edit-save" class="send-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
